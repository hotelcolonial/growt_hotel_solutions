<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth Hotel Solutions — Terceirização comercial para hotéis</title>
<link rel="icon" href="logo-growth-transparente.png" type="image/png">
<meta name="description" content="Terceirização comercial para hotéis: revenue, distribuição, conteúdo, performance e central de reservas.">
<meta property="og:title" content="Growth Hotel Solutions">
<meta property="og:description" content="Terceirização comercial para hotéis: revenue, distribuição, conteúdo, performance e central de reservas.">
<meta property="og:type" content="website">
<meta property="og:image" content="logo-growth-transparente.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: "HelveticaNeueCyr"; src: url("HelveticaNeueCyr-Light.ttf") format("truetype"); font-weight: 300; font-style: normal; font-display: swap; }
  @font-face { font-family: "HelveticaNeueCyr"; src: url("HelveticaNeueCyr-Roman.ttf") format("truetype"); font-weight: 400; font-style: normal; font-display: swap; }
  :root {
    --bg:#F4EFEA; --bg-elev-1:#EAE3DA; --bg-elev-2:#101113; --bg-deep:#1E2024;
    --fg:#101113; --fg-muted:#5E6166; --fg-subtle:#9DA0A5;
    --accent:#D4AF37; --accent-deep:#A38628; --on-accent:#101113; --on-dark:#F4EFEA;
    --border:rgba(16,17,19,0.10); --border-strong:rgba(16,17,19,0.20);
    --font-display:"Montserrat",system-ui,sans-serif;
    --font-body:"Inter",system-ui,sans-serif;
    --font-mono:"Inter",ui-monospace,monospace;
    --ease-out-expo:cubic-bezier(0.16,1,0.3,1);
    --ease-in-out-quart:cubic-bezier(0.76,0,0.24,1);
    --ease-out-cubic:cubic-bezier(0.33,1,0.68,1);
    --gutter:clamp(20px,4vw,64px);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--fg);font-family:var(--font-body);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  body{cursor:none;}
  @media(hover:none){body{cursor:auto;}#cursor{display:none!important;}}
  a{color:inherit;text-decoration:none;}
  button{background:none;border:none;color:inherit;font:inherit;cursor:none;}
  ::selection{background:var(--accent);color:var(--bg);}
  #cursor{position:fixed;top:0;left:0;width:12px;height:12px;border-radius:50%;background:#fff;pointer-events:none;z-index:9999;mix-blend-mode:difference;transition:width .4s var(--ease-out-expo),height .4s var(--ease-out-expo),background .3s ease;transform:translate(-50%,-50%);will-change:transform,width,height;}
  #cursor.hover{width:56px;height:56px;}
  #cursor.text{width:4px;height:24px;border-radius:2px;}
  #loader{position:fixed;inset:0;z-index:10000;overflow:hidden;pointer-events:none;}
  #loader .loader-wave{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #loader .loader-words{position:absolute;inset:0;display:grid;place-items:center;padding:0 6vw;}
  #loader .lw{max-width:24ch;text-align:center;opacity:0;transform:translateY(42px);font-family:"HelveticaNeueCyr","Inter","Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:300;font-size:clamp(24px,3.8vw,56px);letter-spacing:-.045em;line-height:1.12;color:#101113;text-transform:lowercase;}
  #loader .lw em{font-style:normal;color:#F95738;}
  #loader .lwphrase{animation:lwCycle 3.1s cubic-bezier(0.33,1,0.68,1) .4s;}
  @keyframes lwCycle{0%{opacity:0;transform:translateY(40px);}14%{opacity:1;transform:translateY(0);}78%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-40px);}}
  #loader .loader-logo{position:absolute;top:50%;left:50%;width:clamp(220px,32vw,420px);opacity:0;transform:translate(-50%,-50%) scale(.94);animation:logoCycle 2.4s cubic-bezier(0.33,1,0.68,1) 3.5s;}
  #loader .loader-logo img{width:100%;height:auto;display:block;}
  @keyframes logoCycle{0%{opacity:0;transform:translate(-50%,-50%) scale(.94);}18%{opacity:1;transform:translate(-50%,-50%) scale(1);}72%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-50%) scale(1.03);}}
  #curtain{position:fixed;inset:0;z-index:9000;pointer-events:none;display:grid;place-items:center;visibility:hidden;overflow:hidden;}
  #curtain.in,#curtain.out{visibility:visible;}
  #curtain .curtain-sq{width:150vmax;height:150vmax;background:var(--bg);border-radius:16%;transform:scale(0);will-change:transform;}
  #curtain.in .curtain-sq{animation:sqIn .55s cubic-bezier(0.76,0,0.24,1) forwards;}
  #curtain.out .curtain-sq{animation:sqOut .6s cubic-bezier(0.76,0,0.24,1) forwards;}
  @keyframes sqIn{from{transform:scale(0);}to{transform:scale(1);}}
  @keyframes sqOut{from{transform:scale(1);}to{transform:scale(0);}}
  .reveal{opacity:0;transform:translateY(26px) scale(0.988);transition:opacity 1.15s cubic-bezier(0.22,1,0.36,1),transform 1.15s cubic-bezier(0.22,1,0.36,1);will-change:opacity,transform;}
  .reveal.in{opacity:1;transform:translateY(0) scale(1);}
  .reveal-line{overflow:hidden;}
  .reveal-line>span{display:inline-block;transform:translateY(110%);opacity:0;transition:transform 1.05s cubic-bezier(0.22,1,0.36,1),opacity 1.05s cubic-bezier(0.22,1,0.36,1);will-change:transform,opacity;}
  .reveal-line.in>span{transform:translateY(0);opacity:1;}
  @media(prefers-reduced-motion:reduce){.reveal,.reveal-line>span{transition:none!important;transform:none!important;opacity:1!important;}}
  .h-display{font-family:var(--font-display);font-weight:800;letter-spacing:-.03em;line-height:.95;}
  .h-hero{font-size:clamp(56px,11vw,200px);}
  .h-1{font-size:clamp(48px,7vw,120px);line-height:1.0;}
  .h-2{font-size:clamp(36px,5vw,80px);line-height:1.02;}
  .h-3{font-size:clamp(22px,2.2vw,36px);line-height:1.15;}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-muted);display:inline-flex;align-items:center;gap:12px;}
  .eyebrow::before{content:"";width:24px;height:1px;background:var(--accent);}
  .lead{font-size:clamp(17px,1.4vw,22px);line-height:1.5;color:var(--fg-muted);max-width:60ch;}
  .lead.light{color:rgba(16,17,19,0.72);}
  em.serif{font-style:normal;font-family:var(--font-display);color:var(--accent);font-weight:700;}
  .btn{display:inline-flex;align-items:center;gap:14px;padding:18px 28px;border-radius:999px;font-size:13px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;font-family:var(--font-body);transition:background .4s var(--ease-out-cubic),color .4s var(--ease-out-cubic),border-color .4s var(--ease-out-cubic),transform .3s var(--ease-out-cubic);position:relative;overflow:hidden;}
  .btn .arrow{display:inline-block;transition:transform .5s var(--ease-out-expo);}
  .btn:hover .arrow{transform:translateX(6px);}
  .btn-primary{background:var(--fg);color:var(--on-dark);}
  .btn-primary:hover{background:var(--accent);color:var(--on-accent);}
  .btn-ghost{background:transparent;color:var(--fg);border:1px solid var(--border-strong);}
  .btn-ghost:hover{background:var(--fg);color:var(--on-dark);border-color:var(--fg);}
  .btn-accent{background:var(--accent);color:var(--on-accent);}
  .btn-accent:hover{background:var(--fg);color:var(--on-dark);}
  .container{padding-left:var(--gutter);padding-right:var(--gutter);}
  section{padding:clamp(60px,9vw,150px) 0;position:relative;}
  .photo{background:var(--bg-elev-2);border:1px solid var(--border);position:relative;overflow:hidden;}
  .photo img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 1.6s var(--ease-out-expo);}
  .photo:hover img{transform:scale(1.04);}
  .photo .photo-label{position:absolute;top:16px;left:16px;font-family:var(--font-body);font-weight:500;font-size:10px;letter-spacing:.15em;color:rgba(244,239,234,0.92);text-transform:uppercase;background:rgba(16,17,19,0.6);backdrop-filter:blur(8px);padding:6px 10px;border-radius:999px;border:1px solid rgba(244,239,234,0.15);}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.05  0 0 0 0 0.10  0 0 0 0 0.16  0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");opacity:.05;z-index:8000;mix-blend-mode:multiply;}
  .marquee{overflow:hidden;white-space:nowrap;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:28px 0;}
  .marquee-track{display:inline-flex;gap:60px;animation:marquee 40s linear infinite;padding-left:60px;}
  .marquee-item{font-family:"HelveticaNeueCyr","Inter","Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:300;text-transform:lowercase;letter-spacing:-.045em;font-size:clamp(40px,6vw,80px);color:var(--fg);}
  .marquee-item.muted{color:var(--fg-subtle);}
  .marquee-item .dot{color:var(--accent);margin-left:60px;display:inline-block;}
  @keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--bg-elev-1);border-radius:4px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--border-strong);}
  @media(max-width:768px){section{padding:80px 0;}}
  @media(max-width:880px){.two-col{grid-template-columns:1fr!important;}}
</style>
</head>
<body>
  <div id="loader">
    <svg class="loader-wave" viewBox="0 0 1440 900" preserveAspectRatio="none" aria-hidden="true">
      <path fill="#F4EFEA" d="M0,0 H1440 V900 C1140,900 860,900 580,900 C380,900 180,900 0,900 Z">
        <animate id="loaderWaveAnim" attributeName="d" begin="indefinite" dur="1.5s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.5 0 0.2 1" values="M0,0 H1440 V900 C1140,900 860,900 580,900 C380,900 180,900 0,900 Z;M0,0 H1440 V-90 C1140,60 860,-180 580,-30 C380,40 180,-150 0,-70 Z" />
      </path>
    </svg>
    <div class="loader-words">
      <span class="lw lwphrase">o que <em>construímos</em> hoje impulsiona o <em>crescimento</em> de amanhã</span>
    </div>
    <div class="loader-logo"><img src="logo-growth-transparente.png" alt="Growth Hotel Solutions" /></div>
  </div>
  <div id="cursor"></div>
  <div id="curtain"><div class="curtain-sq"></div></div>
  <div id="root"></div>

  <script>
    (function(){
      var cursor=document.getElementById('cursor');
      var tx=0,ty=0,cx=0,cy=0;
      window.addEventListener('mousemove',function(e){tx=e.clientX;ty=e.clientY;});
      function loop(){cx+=(tx-cx)*.22;cy+=(ty-cy)*.22;cursor.style.transform='translate('+cx+'px,'+cy+'px) translate(-50%,-50%)';requestAnimationFrame(loop);}
      loop();
      document.addEventListener('mouseover',function(e){
        var el=e.target;
        if(el.closest&&el.closest('a,button,[data-hover]'))cursor.classList.add('hover');else cursor.classList.remove('hover');
        if(el.closest&&el.closest('[data-cursor-text]'))cursor.classList.add('text');else cursor.classList.remove('text');
      });
    })();
    (function(){
      var loader=document.getElementById('loader');
      var wave=document.getElementById('loaderWaveAnim');
      setTimeout(function(){
        if(wave && wave.beginElement){ try{wave.beginElement();}catch(e){} }
        document.dispatchEvent(new CustomEvent('app:ready'));
      },5700);
      setTimeout(function(){loader.style.display='none';},7300);
    })();
    window.__resources = window.__resources || {};
    window.__resources.logoGrowth = "logo-growth-transparente.png";
    window.__setupReveals=function(){
      var els=document.querySelectorAll('.reveal:not(.in),.reveal-line:not(.in)');
      var io=new IntersectionObserver(function(entries){entries.forEach(function(en){if(en.isIntersecting){en.target.classList.add('in');io.unobserve(en.target);}});},{threshold:.15,rootMargin:'0px 0px -80px 0px'});
      els.forEach(function(el){io.observe(el);});
    };
  </script>

  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
